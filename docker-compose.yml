services:
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: energy_api
    ports:
      - "8000:8000"        # ✅ KEEP THIS
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

    # 🔥 ADD THIS
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    container_name: energy_ui
    ports:
      - "8501:8501"        # ✅ KEEP THIS
    volumes:
      - .:/app

    # 🔥 REPLACE depends_on
    depends_on:
      backend:
        condition: service_healthy